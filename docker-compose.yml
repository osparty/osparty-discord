services:
  discord-bot:
    # Image is built + pushed to GHCR by the deploy workflow; the server pulls it (see IMAGE_TAG).
    # For a purely local build instead, run: docker compose build (uses the Dockerfile in this dir).
    image: ghcr.io/osparty/osparty-discord:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DISCORD_INTERNAL_TOKEN: "${DISCORD_INTERNAL_TOKEN:-}"
      DISCORD_TOKEN: "${DISCORD_TOKEN:-}"
      DISCORD_GUILD_ID: "${DISCORD_GUILD_ID:-0}"
      DISCORD_CATEGORY_ID: "${DISCORD_CATEGORY_ID:-0}"
      DISCORD_INVITE_MAX_AGE_SECONDS: "${DISCORD_INVITE_MAX_AGE_SECONDS:-86400}"
      DISCORD_INVITE_MAX_USES: "${DISCORD_INVITE_MAX_USES:-0}"
      SERVER_PORT: "8090"
    # In production set BOT_BIND_IP to MAIN's PRIVATE IP in .env, so the port is reachable by the API
    # instances (this box + the remote nodes) over the private network only, never public. Left unset it
    # binds all interfaces (fine locally / behind a host firewall).
    ports:
      - target: 8090
        published: 8090
        host_ip: "${BOT_BIND_IP:-0.0.0.0}"
    restart: unless-stopped
